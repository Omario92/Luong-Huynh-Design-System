<!doctype html>
<!-- @dsCard group="Type" name="Display type" subtitle="Newake · brand display font · uppercase" viewport="700x240" -->
<html lang="en"><head><meta charset="utf-8"/><title>Display type</title>
<link rel="stylesheet" href="_base.css"/>
<style>
  .card { padding: 24px 32px; display: flex; flex-direction: column; gap: 8px; }
  .specimen {
    font-family: "Newake", "Inter Tight", sans-serif;
    color: var(--fg-1);
    font-size: 100px;
    line-height: 0.96;
    letter-spacing: 0.15em;
    font-weight: 400;
    text-transform: uppercase;
  }
  .row { display: flex; justify-content: space-between; align-items: flex-end; gap: 12px; }
  .label { font-family: var(--font-mono); font-size: 11px; color: var(--fg-2); }
  .eyebrow { color: var(--fg-accent); font-size: 11px; letter-spacing: 0.16em; font-weight: 700; text-transform: uppercase; }
  .glyphs { font-family: "Newake", "Inter Tight", sans-serif; font-size: 24px; letter-spacing: 0.10em; color: var(--fg-2); text-transform: uppercase; }
</style>
</head><body>
<div class="card">
  <div class="eyebrow">Display · Newake · brand font</div>
  <div class="specimen">Luong&nbsp;Huynh</div>
  <div class="row">
    <span class="label">--type-hero · clamp(64px, 14vw, 200px) / lh 0.92 / tracking +0.10em · uppercase</span>
    <span class="glyphs">A B E M R · 0 1 2 3</span>
  </div>
</div>
</body></html>
