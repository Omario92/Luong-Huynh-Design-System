<!doctype html>
<!-- @dsCard group="Components" name="Buttons" subtitle="Primary · secondary · default & hover" viewport="700x280" -->
<html lang="en"><head><meta charset="utf-8"/><title>Buttons</title>
<link rel="stylesheet" href="_base.css"/>
<style>
  .card { padding: 28px 32px; display: flex; flex-direction: column; gap: 16px; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .label { font-family: var(--font-mono); font-size: 10px; color: var(--fg-2); width: 90px; }
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 10px; height: 48px; padding: 0 22px; border-radius: 999px; font-size: 13px; line-height: 1; letter-spacing: 0.08em; font-weight: 800; text-transform: uppercase; border: 1px solid transparent; transition: transform .45s cubic-bezier(.16,1,.3,1), background .45s cubic-bezier(.16,1,.3,1), border-color .45s cubic-bezier(.16,1,.3,1); }
  .btn.primary { background: #00f0ff; color: #070707; border-color: #00f0ff; }
  .btn.primary.hover { background: #f4f0e8; border-color: #f4f0e8; transform: translateY(-2px); }
  .btn.secondary { background: transparent; color: #f4f0e8; border-color: rgba(244,240,232,0.28); }
  .btn.secondary.hover { background: rgba(244,240,232,0.08); border-color: #f4f0e8; transform: translateY(-2px); }
  .btn.small { height: 36px; padding: 0 14px; font-size: 11px; letter-spacing: 0.11em; }
</style>
</head><body>
<div class="card">
  <div class="row"><span class="label">primary</span>
    <button class="btn primary">View Portfolio</button>
    <button class="btn primary hover">View Portfolio</button>
  </div>
  <div class="row"><span class="label">secondary</span>
    <button class="btn secondary">Get in Touch</button>
    <button class="btn secondary hover">Get in Touch</button>
  </div>
  <div class="row"><span class="label">small / pill</span>
    <button class="btn secondary small">All</button>
    <button class="btn primary small">AI Generated</button>
    <button class="btn secondary small">CGI</button>
    <button class="btn secondary small">3D Model</button>
  </div>
</div>
</body></html>
