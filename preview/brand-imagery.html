<!doctype html>
<!-- @dsCard group="Brand" name="Imagery direction" subtitle="Project thumbs · 4:5 cinematic" viewport="700x260" -->
<html lang="en"><head><meta charset="utf-8"/><title>Imagery</title>
<link rel="stylesheet" href="_base.css"/>
<style>
  .card { padding: 24px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .thumb { aspect-ratio: 4/5; overflow: hidden; border-radius: 16px; border: 1px solid var(--lh-line); position: relative; }
  .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .name { position: absolute; bottom: 10px; left: 10px; font-family: var(--font-body); font-size: 9px; letter-spacing: 0.12em; color: #f4f0e8; font-weight: 700; text-transform: uppercase; }
</style>
</head><body>
<div class="card">
  <div class="thumb"><img src="../assets/work/stride-beyond.svg"/><span class="name">Stride Beyond</span></div>
  <div class="thumb"><img src="../assets/work/nexora.svg"/><span class="name">Nexora</span></div>
  <div class="thumb"><img src="../assets/work/bt-studio-beverage.svg"/><span class="name">BT Studio</span></div>
  <div class="thumb"><img src="../assets/work/halida-tet-2022.svg"/><span class="name">Halida Tet 22</span></div>
</div>
</body></html>
