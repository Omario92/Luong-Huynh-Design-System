<!doctype html>
<!-- @dsCard group="Components" name="Work card" subtitle="Default + hover state side by side" viewport="700x420" -->
<html lang="en"><head><meta charset="utf-8"/><title>Work card</title>
<link rel="stylesheet" href="_base.css"/>
<style>
  .card { padding: 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .work { border: 1px solid var(--lh-line); border-radius: 24px; overflow: hidden; background: var(--lh-panel); display: flex; flex-direction: column; }
  .work.hover { border-color: rgba(244,240,232,0.28); background: var(--lh-panel-2); transform: translateY(-4px); }
  .media { aspect-ratio: 4/5; background: #111; overflow: hidden; border-radius: 23px 23px 20px 20px; }
  .media img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .work.hover .media img { transform: scale(1.055); filter: contrast(1.08) saturate(1.08); }
  .media img { transition: transform .9s cubic-bezier(.16,1,.3,1), filter .9s cubic-bezier(.16,1,.3,1); }
  .info { padding: 16px 18px 18px; display: flex; flex-direction: column; gap: 10px; }
  .title { font-family: var(--font-display); color: #f4f0e8; font-size: 22px; font-weight: 700; letter-spacing: -0.04em; line-height: 0.98; }
  .tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .tag { display: inline-flex; align-items: center; height: 22px; padding: 0 8px; border: 1px solid var(--lh-line); border-radius: 999px; color: rgba(244,240,232,0.72); font-size: 9px; letter-spacing: 0.12em; font-weight: 700; text-transform: uppercase; }
  .label { position: absolute; top: 16px; left: 16px; font-family: var(--font-mono); font-size: 10px; color: var(--fg-2); letter-spacing: 0; padding: 4px 8px; border: 1px solid var(--lh-line); border-radius: 999px; background: rgba(7,7,7,0.6); }
  .state { position: relative; }
  .state-label { position: absolute; top: 10px; left: 10px; z-index: 2; }
</style>
</head><body>
<div class="card">
  <div class="state">
    <div class="state-label label">default</div>
    <div class="work">
      <div class="media"><img src="../assets/work/stride-beyond.svg" alt=""/></div>
      <div class="info">
        <div class="title">Stride Beyond</div>
        <div class="tags"><span class="tag">AI Generated</span><span class="tag">Branding</span></div>
      </div>
    </div>
  </div>
  <div class="state">
    <div class="state-label label">hover</div>
    <div class="work hover">
      <div class="media"><img src="../assets/work/bt-studio-beverage.svg" alt=""/></div>
      <div class="info">
        <div class="title">BT Studio – CGI Beverage Demo</div>
        <div class="tags"><span class="tag">CGI</span><span class="tag">Branding</span></div>
      </div>
    </div>
  </div>
</div>
</body></html>
