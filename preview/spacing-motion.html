<!doctype html>
<!-- @dsCard group="Spacing" name="Motion" subtitle="ease-out-quint · 0.25 / 0.45 / 0.9s" viewport="700x240" -->
<html lang="en"><head><meta charset="utf-8"/><title>Motion</title>
<link rel="stylesheet" href="_base.css"/>
<style>
  .card { padding: 28px 32px; display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .col { display: flex; flex-direction: column; gap: 10px; }
  .label { font-family: var(--font-mono); font-size: 11px; color: var(--fg-2); }
  .name { font-family: var(--font-display); font-size: 22px; font-weight: 800; letter-spacing: -0.04em; }
  .curve { height: 100px; border: 1px solid var(--lh-line); border-radius: 12px; padding: 10px; background: var(--lh-panel); position: relative; }
  .curve svg { width: 100%; height: 100%; }
  .durations { display: grid; gap: 10px; }
  .dur { display: grid; grid-template-columns: 1fr 70px; gap: 12px; align-items: center; padding: 10px 14px; border: 1px solid var(--lh-line); border-radius: 12px; background: var(--lh-panel); }
  .dur .meter { height: 4px; background: rgba(244,240,232,0.08); border-radius: 999px; overflow: hidden; }
  .dur .meter > div { height: 100%; background: var(--lh-accent); }
  .dur .time { font-family: var(--font-mono); font-size: 11px; color: var(--fg-1); text-align: right; }
</style>
</head><body>
<div class="card">
  <div class="col">
    <span class="label">ease-out-quint · cubic-bezier(.16, 1, .3, 1)</span>
    <div class="curve">
      <svg viewBox="0 0 200 80" preserveAspectRatio="none">
        <line x1="0" y1="80" x2="200" y2="80" stroke="rgba(244,240,232,0.14)" stroke-dasharray="2 4"/>
        <line x1="0" y1="0" x2="200" y2="0" stroke="rgba(244,240,232,0.14)" stroke-dasharray="2 4"/>
        <path d="M 0 80 C 32 80, 60 0, 200 0" stroke="#00f0ff" stroke-width="2" fill="none"/>
      </svg>
    </div>
    <span class="label">Slow start · fast settle · used on cards, buttons, reveals</span>
  </div>
  <div class="col">
    <span class="label">durations</span>
    <div class="durations">
      <div class="dur"><div class="meter"><div style="width:22%"></div></div><span class="time">0.25s</span></div>
      <div class="dur"><div class="meter"><div style="width:48%"></div></div><span class="time">0.45s</span></div>
      <div class="dur"><div class="meter"><div style="width:92%"></div></div><span class="time">0.90s</span></div>
    </div>
    <span class="label">fast buttons → card chrome → media scale</span>
  </div>
</div>
</body></html>
