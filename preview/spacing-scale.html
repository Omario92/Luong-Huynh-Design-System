<!doctype html>
<!-- @dsCard group="Spacing" name="Spacing scale" subtitle="4 → 120 px" viewport="700x340" -->
<html lang="en"><head><meta charset="utf-8"/><title>Spacing scale</title>
<link rel="stylesheet" href="_base.css"/>
<style>
  .card { padding: 28px 32px; display: grid; gap: 12px; }
  .row { display: grid; grid-template-columns: 80px 1fr 80px; align-items: center; gap: 14px; }
  .name { font-family: var(--font-mono); font-size: 11px; color: var(--fg-2); }
  .bar { height: 14px; background: var(--lh-accent); border-radius: 4px; }
  .px { font-family: var(--font-mono); font-size: 11px; color: var(--fg-1); text-align: right; }
</style>
</head><body>
<div class="card">
  <div class="row"><span class="name">--space-1</span><div class="bar" style="width:4px"></div><span class="px">4px</span></div>
  <div class="row"><span class="name">--space-2</span><div class="bar" style="width:8px"></div><span class="px">8px</span></div>
  <div class="row"><span class="name">--space-3</span><div class="bar" style="width:12px"></div><span class="px">12px</span></div>
  <div class="row"><span class="name">--space-4</span><div class="bar" style="width:16px"></div><span class="px">16px</span></div>
  <div class="row"><span class="name">--space-5</span><div class="bar" style="width:24px"></div><span class="px">24px</span></div>
  <div class="row"><span class="name">--space-6</span><div class="bar" style="width:32px"></div><span class="px">32px</span></div>
  <div class="row"><span class="name">--space-7</span><div class="bar" style="width:48px"></div><span class="px">48px</span></div>
  <div class="row"><span class="name">--space-8</span><div class="bar" style="width:72px"></div><span class="px">72px</span></div>
  <div class="row"><span class="name">--space-9</span><div class="bar" style="width:120px"></div><span class="px">120px</span></div>
</div>
</body></html>
