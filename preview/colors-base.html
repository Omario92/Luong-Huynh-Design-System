<!doctype html>
<!-- @dsCard group="Colors" name="Base colors" subtitle="Black room — base, soft, panel, panel-2" viewport="700x280" -->
<html lang="en"><head><meta charset="utf-8"/><title>Brand colors</title>
<link rel="stylesheet" href="_base.css"/>
<style>
  .card { padding: 24px; }
  .stack { display: grid; grid-template-columns: 1.6fr 1fr 1fr 1fr; gap: 10px; height: 256px; }
  .stack .swatch { display:flex; align-items:flex-end; }
</style>
</head><body>
<div class="card">
  <div class="stack">
    <div class="swatch" style="background:#070707; border-color: rgba(244,240,232,0.18);">
      <div class="hex">#070707</div>
      <div class="label">BG · base</div>
    </div>
    <div class="swatch" style="background:#101010;">
      <div class="hex">#101010</div>
      <div class="label">BG · soft</div>
    </div>
    <div class="swatch" style="background:#151515;">
      <div class="hex">#151515</div>
      <div class="label">Panel</div>
    </div>
    <div class="swatch" style="background:#1c1c1c;">
      <div class="hex">#1c1c1c</div>
      <div class="label">Panel · 2</div>
    </div>
  </div>
</div>
</body></html>
